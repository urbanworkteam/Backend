spring:
  application:
    name: farmily-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:30}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  cache:
    type: redis
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc.time_zone: UTC

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      group:
        cache:
          include: redis
          show-components: always

farmily:
  jwt:
    secret: ${JWT_SECRET}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:2592000}
  auth:
    dev-master:
      enabled: ${AUTH_DEV_MASTER_ENABLED:false}
      code: ${AUTH_DEV_MASTER_CODE:DEV_MASTER}
      kakao-id: ${AUTH_DEV_MASTER_KAKAO_ID:dev-master-1}
      nickname: ${AUTH_DEV_MASTER_NICKNAME:DevMaster}
      email: ${AUTH_DEV_MASTER_EMAIL:dev-master@local}
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:}
    admin-key: ${KAKAO_ADMIN_KEY:}
  s3:
    bucket: ${S3_BUCKET:farmily-local}
    region: ${S3_REGION:ap-northeast-2}
    endpoint: ${S3_ENDPOINT:}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    cdn-base-url: ${CDN_BASE_URL:}
    presign-ttl-seconds: 300
    display-ttl-seconds: 3600
  kma:
    service-key: ${KMA_SERVICE_KEY:}
    base-url: ${KMA_BASE_URL:https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0}
  ai:
    provider: ${AI_PROVIDER:agentcore}
    aws-region: ${AWS_REGION:us-west-2}
    bedrock-agent-id: ${BEDROCK_AGENT_ID:}
    bedrock-agent-alias-id: ${BEDROCK_AGENT_ALIAS_ID:}
    invoke-timeout-seconds: ${AI_INVOKE_TIMEOUT_SECONDS:120}
    result-bucket: ${AI_RESULT_BUCKET:}
  portone:
    api-key: ${PORTONE_API_KEY:}
    api-secret: ${PORTONE_API_SECRET:}
    imp-code: ${PORTONE_IMP_CODE:}
    webhook-secret: ${PORTONE_WEBHOOK_SECRET:}
    test-mode: ${PORTONE_TEST_MODE:true}
  fcm:
    service-account-json: ${FCM_SERVICE_ACCOUNT_JSON:}
    dry-run: ${FCM_DRY_RUN:false}
  experiment:
    enabled: ${EXPERIMENT_ENABLED:false}
  plans:
    free:
      credits-limit: 5
      period: MONTHLY
    all-in-one:
      credits-limit: 50
      period: MONTHLY
      price: 14900

logging:
  level:
    root: INFO
    kr.farmily: DEBUG
    org.hibernate.SQL: INFO
