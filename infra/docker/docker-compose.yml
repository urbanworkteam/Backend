services:
  postgres:
    image: postgres:16
    container_name: farmily-postgres
    environment:
      POSTGRES_DB: farmily
      POSTGRES_USER: farmily
      POSTGRES_PASSWORD: farmily
    ports:
      - "5432:5432"
    volumes:
      - farmily-pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: farmily-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: farmily-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - farmily-minio:/data

volumes:
  farmily-pg:
  farmily-minio:
