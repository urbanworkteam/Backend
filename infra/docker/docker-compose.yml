services:
  postgres:
    image: postgres:16
    container_name: farmily-postgres
    environment:
      POSTGRES_DB: farmily
      POSTGRES_USER: farmily
      POSTGRES_PASSWORD: farmily
    ports:
      - "5432:5432"
    volumes:
      - farmily-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmily -d farmily"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: farmily-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: farmily-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - farmily-minio:/data

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: farmily-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/farmily
      SPRING_DATASOURCE_USERNAME: farmily
      SPRING_DATASOURCE_PASSWORD: farmily
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      JWT_SECRET: local-dev-secret-please-change-this-to-at-least-32-bytes-random
      AUTH_DEV_MASTER_ENABLED: "true"
      AUTH_DEV_MASTER_CODE: DEV_MASTER
      S3_BUCKET: farmily-local
      S3_REGION: us-east-1
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      CDN_BASE_URL: http://localhost:9000/farmily-local
    ports:
      - "8080:8080"

volumes:
  farmily-pg:
  farmily-minio:
