# Backend CI/CD — Phase 1(ci + ECR push) + Phase 2(ECS 자동배포) 완성
# feat push → farmily-api-dev ECR / main push → farmily-api ECR → ECS prod 자동배포
# 이미지 태그: {env}-{short-sha} (latest 단독 배포 금지)
#
# Jobs:
#   ci          : gradle test + SonarCloud (PR·push 공통)
#   push-image  : Buildx build(gha 레이어 캐시) → ECR push (push 이벤트만)
#   deploy-prod : ECS RegisterTaskDef + UpdateService + wait (main push만)
#   deploy-dev  : ECS 자동배포(dev) — feat push만 (dev 인프라 apply 후 가동)
#
# 전제: AWS_ROLE_ARN(farmily-cicd-backend-role), SONAR_TOKEN 등록 완료.

name: Backend CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [feat, main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  # ─── Job 1: CI (테스트 + 정적분석) ─── PR·push 공통
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud new-code 분석 위해 전체 히스토리

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Unit Test
        run: chmod +x gradlew && ./gradlew test

      - name: SonarCloud Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar

      - name: Notify Slack (CI failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "❌ CI 실패 — Backend / `${{ github.ref_name }}` | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 보기>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ─── Job 2: 이미지 빌드 + ECR Push ─── push 이벤트만
  push-image:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}   # deploy-prod에서 사용할 전체 이미지 URI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      # 레지스트리 주소(ECR 로그인 후 확정)와 합쳐 전체 이미지 URI·태그 목록 산출
      # main → farmily-api:prod-<sha> + latest / feat → farmily-api-dev:dev-<sha>
      - name: Set image metadata (repo, tags)
        id: meta
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            REPO=farmily-api;     TARGET=prod
          else
            REPO=farmily-api-dev; TARGET=dev
          fi
          IMAGE="$REGISTRY/$REPO"
          TAG="$TARGET-${GITHUB_SHA::7}"
          # build-push-action은 tags를 줄바꿈으로 다중 지정. prod만 latest(운영 포인터) 추가
          TAGS="$IMAGE:$TAG"
          if [ "$TARGET" = "prod" ]; then
            TAGS=$(printf '%s\n%s' "$IMAGE:$TAG" "$IMAGE:latest")
          fi
          {
            echo "image=$IMAGE:$TAG"
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # BuildKit 활성화 — gha 레이어 캐시(cache-from/to) 사용에 필수
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      # A: GitHub Actions 캐시로 빌드 레이어 재사용
      #   - Gradle 배포본/의존성 레이어가 캐시되어 매 빌드 재다운로드 제거(빌드 단축 + 504 회피)
      #   - cache-to mode=max: 중간 레이어까지 캐시 / type=gha: 무료 10GB GitHub 호스팅 캐시
      - name: Build & Push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: ECS 배포 (prod) ─── main push만
  deploy-prod:
    needs: push-image
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition prod-app \
            --query taskDefinition \
            --output json > task-def.json

      - name: Render new task definition (이미지 교체)
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@6853cfae8c3a7d978fbf68b5a55453395541dfbb  # v1.8.5
        with:
          task-definition: task-def.json
          container-name: prod-app
          image: ${{ needs.push-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@a310a830f5c14e583e35d84e4e1ec7dd177c3c9c  # v2.6.2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: prod-app-service
          cluster: prod-cluster
          wait-for-service-stability: true

      - name: Notify Slack (deploy success)
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "✅ prod 배포 완료 — Backend | `${{ github.sha }}`"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack (deploy failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "❌ prod 배포 실패 — Backend | `${{ github.sha }}` | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 보기>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ─── Job 4: ECS 배포 (dev) ─── feat push만
  # prod와 동형. 차이: feat 트리거 / dev-app task def / dev-app-service / dev-cluster.
  # 이미지는 push-image가 feat 브랜치에서 farmily-api-dev:dev-<sha>로 빌드한 것을 그대로 사용.
  # ⚠️ dev ECS 서비스(dev-app-service)·task def(dev-app)가 apply 완료돼야 동작.
  deploy-dev:
    needs: push-image
    if: github.ref_name == 'feat'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition dev-app \
            --query taskDefinition \
            --output json > task-def.json

      - name: Render new task definition (이미지 교체)
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@6853cfae8c3a7d978fbf68b5a55453395541dfbb  # v1.8.5
        with:
          task-definition: task-def.json
          container-name: dev-app
          image: ${{ needs.push-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@a310a830f5c14e583e35d84e4e1ec7dd177c3c9c  # v2.6.2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: dev-app-service
          cluster: dev-cluster
          wait-for-service-stability: true

      - name: Notify Slack (deploy success)
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "✅ dev 배포 완료 — Backend | `${{ github.sha }}`"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack (deploy failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "❌ dev 배포 실패 — Backend | `${{ github.sha }}` | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 보기>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
