# Backend CI/CD — 현재 실행 가능 범위 (test + ECR push)
# feat push → dev 태그, main push → prod 태그 / 이미지 태그 {env}-<short-sha>
#
# 현재 작성 범위: ci(gradle test + SonarCloud) + push-image(build → ECR push).
# 아래는 전제조건 충족 후 추가 (지금은 미포함):
#   - deploy-*    : ECS 인프라(민석) + PassRole 정책 콘솔 적용 + GitHub Environment
#   - Slack 알림  : SLACK_WEBHOOK_URL
# 완성형 파이프라인 설계는 구축가이드 / Farmily-CICD-파이프라인-설계서(ECS) 참고.

name: Backend CI/CD

on:
  pull_request:
    branches: [main]      # feat → main PR 시 test만
  push:
    branches: [feat, main]

permissions:
  id-token: write   # OIDC 토큰 발급 (push-image의 AWS 인증)
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: farmily-api

jobs:
  # ─── Job 1: CI (테스트) ───  PR·push 공통
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud의 정확한 new-code 분석 위해 전체 히스토리

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Unit Test
        run: chmod +x gradlew && ./gradlew test

      - name: SonarCloud Analyze   # Gradle 플러그인(org.sonarqube). test가 먼저 컴파일하므로 sonar가 그 산출물 분석
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar

  # ─── Job 2: 이미지 빌드 + ECR Push ───  push 일 때만
  push-image:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set target env & image tag   # main=prod, feat=dev / 태그=<env>-<short-sha>
        id: meta
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then TARGET=prod; else TARGET=dev; fi
          echo "image_tag=$TARGET-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1 (SHA 핀: 공급망 공격 방지)
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5 (SHA 핀: 공급망 공격 방지)

      - name: Build & Push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          TARGET: ${{ steps.meta.outputs.target }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -f infra/docker/Dockerfile -t "$IMAGE:$IMAGE_TAG" .
          docker push "$IMAGE:$IMAGE_TAG"
          # prod는 '현재 운영' 포인터로 latest도 갱신
          if [ "$TARGET" = "prod" ]; then
            docker tag "$IMAGE:$IMAGE_TAG" "$IMAGE:latest"
            docker push "$IMAGE:latest"
          fi
