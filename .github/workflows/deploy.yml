# Backend CI/CD — Phase 1(ci + ECR push) + Phase 2(ECS 자동배포) 완성
# feat push → farmily-api-dev ECR / main push → farmily-api ECR → ECS prod 자동배포
# 이미지 태그: {env}-{short-sha} (latest 단독 배포 금지)
#
# Jobs:
#   ci          : gradle test + SonarCloud (PR·push 공통)
#   push-image  : Docker build → ECR push (push 이벤트만)
#   deploy-prod : ECS RegisterTaskDef + UpdateService + wait (main push만)
#   deploy-dev  : dev 인프라 apply 후 활성화 예정 (현재 주석)
#
# 전제: AWS_ROLE_ARN(farmily-cicd-backend-role), SONAR_TOKEN 등록 완료.

name: Backend CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [feat, main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  # ─── Job 1: CI (테스트 + 정적분석) ─── PR·push 공통
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud new-code 분석 위해 전체 히스토리

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Unit Test
        run: chmod +x gradlew && ./gradlew test

      - name: SonarCloud Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar

  # ─── Job 2: 이미지 빌드 + ECR Push ─── push 이벤트만
  push-image:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-push.outputs.image }}   # deploy-prod에서 사용할 전체 이미지 URI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set target env, repo & image tag
        id: meta
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            TARGET=prod; REPO=farmily-api
          else
            TARGET=dev;  REPO=farmily-api-dev
          fi
          echo "image_tag=$TARGET-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET"                      >> "$GITHUB_OUTPUT"
          echo "repo=$REPO"                          >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Build & Push image
        id: build-push
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          TARGET:    ${{ steps.meta.outputs.target }}
          REPO:      ${{ steps.meta.outputs.repo }}
        run: |
          IMAGE="$REGISTRY/$REPO"
          docker build -f infra/docker/Dockerfile -t "$IMAGE:$IMAGE_TAG" .
          docker push "$IMAGE:$IMAGE_TAG"
          # prod는 '현재 운영' 포인터로 latest도 갱신 (참조용 — 배포는 SHA 태그로만)
          if [ "$TARGET" = "prod" ]; then
            docker tag "$IMAGE:$IMAGE_TAG" "$IMAGE:latest"
            docker push "$IMAGE:latest"
          fi
          echo "image=$IMAGE:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ─── Job 3: ECS 배포 (prod) ─── main push만
  deploy-prod:
    needs: push-image
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition prod-app \
            --query taskDefinition \
            --output json > task-def.json

      - name: Render new task definition (이미지 교체)
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@6853cfae8c3a7d978fbf68b5a55453395541dfbb  # v1.8.5
        with:
          task-definition: task-def.json
          container-name: prod-app
          image: ${{ needs.push-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@a310a830f5c14e583e35d84e4e1ec7dd177c3c9c  # v2.6.2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: prod-app-service
          cluster: prod-cluster
          wait-for-service-stability: true

